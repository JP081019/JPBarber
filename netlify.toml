[build]
  base    = "frontend"
  publish = "frontend"

[[redirects]]
  from = "/"
  to   = "/public/index.html"
  status = 200

[[redirects]]
  from = "/barbearia/:slug"
  to   = "/public/barbearia/agendamento.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/public/index.html"
  status = 200